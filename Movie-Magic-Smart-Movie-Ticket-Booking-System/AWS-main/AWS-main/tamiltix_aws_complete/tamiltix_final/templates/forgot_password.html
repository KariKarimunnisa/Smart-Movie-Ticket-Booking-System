{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Movie<span>Magic</span></div>
    <h2>Reset Password</h2>
    <p>Enter your email to receive a reset link</p>

    <form method="POST">
      <div class="f">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@email.com">
      </div>

      <button type="submit" class="btn btn-red btn-full">Send Reset Link</button>
    </form>

    <div class="auth-sw">
      <a href="{{ url_for('login') }}">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
