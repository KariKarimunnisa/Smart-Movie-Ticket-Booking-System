{% extends "base.html" %}
{% block title %}Sign In — Movie Magic{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Movie<span>magic</span></div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to continue your cinema journey</p>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="fstack">
        <div class="f"><label>Email</label><input    type="email"    name="email"    required placeholder="you@email.com"></div>
        <div class="f"><label>Password</label><input type="password" name="password" required placeholder="Your password"></div>
        <p style="text-align:right; margin-top:5px;">
          <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
        </p>
        <button type="submit" class="btn btn-red btn-full">Sign In →</button>
      </div>
    </form>
    <div class="auth-sw">New here? <a href="{{ url_for('register') }}">Create account</a></div>
  </div>
</div>
{% endblock %}
